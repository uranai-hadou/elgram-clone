databases:
  - name: elgram-db
    plan: free
    databaseName: elgram
    user: elgram

services:
  - type: web
    name: elgram-backend
    plan: free
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: elgram-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://frontend-rouge-pi-10.vercel.app
      - key: REDIS_URL
        value: ""
